<!doctype html>
<html>
  <head>
    <title>AI Airbnb Assistant</title>
    <style>
      body {
        font-family: Arial;
        background: #f7f7f7;
        padding: 40px;
      }
      .container {
        max-width: 700px;
        margin: auto;
        background: white;
        padding: 25px;
        border-radius: 10px;
        box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
      }
      h2 {
        text-align: center;
      }
      textarea,
      input {
        width: 100%;
        padding: 12px;
        margin-top: 10px;
        margin-bottom: 15px;
        border-radius: 5px;
        border: 1px solid #ccc;
      }
      button {
        width: 100%;
        padding: 12px;
        background: #ff5a5f;
        color: white;
        border: none;
        border-radius: 5px;
        font-size: 16px;
      }
      button:hover {
        background: #e14b50;
      }
      .reply {
        margin-top: 20px;
        padding: 15px;
        background: #eef6ff;
        border-left: 5px solid #2196f3;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>🏠 AI Airbnb Assistant</h2>

      <form method="POST">
        <label>Property Info</label>
        <textarea
          name="property_info"
          rows="6"
          placeholder="Describe your property..."
        ></textarea>

        <label>Guest Question</label>
        <input
          type="text"
          name="question"
          placeholder="e.g. Is there parking?"
        />

        <button type="submit">Generate Reply</button>
      </form>

      {% if reply %}
      <div class="reply">
        <strong>AI Reply:</strong>
        <p>{{ reply }}</p>
      </div>
      {% endif %}
    </div>
  </body>
</html>
