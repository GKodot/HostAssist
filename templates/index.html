<!doctype html>
<html>
  <head>
    <title>HostAssist AI</title>
    <style>
      body {
        font-family: Arial;
        background: #f7f7f7;
        padding: 40px;
      }
      .container {
        max-width: 700px;
        margin: auto;
        background: white;
        padding: 25px;
        border-radius: 10px;
        box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
      }
      textarea,
      input {
        width: 100%;
        padding: 12px;
        margin-top: 10px;
        margin-bottom: 15px;
      }
      button {
        width: 100%;
        padding: 12px;
        background: #ff5a5f;
        color: white;
        border: none;
      }
      .reply {
        margin-top: 20px;
        padding: 15px;
        background: #eef6ff;
      }
      .saved {
        background: #e6ffe6;
        padding: 10px;
        margin-bottom: 15px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>🏠 HostAssist AI</h2>

      {% if not property_saved %}
      <!-- STEP 1: Save Property Info -->
      <form method="POST">
        <h3>Step 1: Enter Property Info</h3>
        <textarea
          name="property_info"
          rows="6"
          placeholder="Describe your property..."
        ></textarea>
        <button type="submit">Save Property</button>
      </form>

      {% else %}
      <!-- STEP 2: Ask Questions -->
      <div class="saved">
        ✅ Property info saved
        <a href="/reset">(Change)</a>
      </div>

      <form method="POST">
        <h3>Ask Guest Question</h3>
        <input
          type="text"
          name="question"
          placeholder="e.g. Is there parking?"
        />
        <button type="submit">Generate Reply</button>
      </form>
      {% endif %} {% if reply %}
      <div class="reply">
        <strong>AI Reply:</strong>
        <p>{{ reply }}</p>
      </div>
      {% endif %}
    </div>
  </body>
</html>
